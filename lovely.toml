[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]] 
[patches.pattern]
target = "cardarea.lua"
pattern = "function CardArea:draw()"
position = "before"
payload = '''
local fool_card = {name = 'None'}
local mail_hit = {name = 'None'}
local idol_hit = {name = 'None'}
local ancient_hit = {name = 'None'}
local obs_on = {name = 'YOU DONT HAVE OBSERVATORY'}
'''
match_indent = true





[[patches]] 
[patches.pattern]
target = "cardarea.lua"
pattern = "function CardArea:draw()"
position = "after"
payload = '''
if self == G.consumeables then
    local fool_c = G.GAME.last_tarot_planet and G.P_CENTERS[G.GAME.last_tarot_planet] or nil
    local idol_h =  G.GAME.current_round.idol_card
    local ancient_h = G.GAME.current_round.ancient_card    
    local mail_h = G.GAME.current_round.mail_card
    local obs_h = G.GAME.used_vouchers.v_observatory

    fool_card.name = fool_c and localize { type = 'name_text', key = fool_c.key, set = fool_c.set } or
            localize('k_none')
    if idol_h then
        idol_hit.name =  'Idol: ' .. idol_h.rank .. ' of ' .. idol_h.suit
    else
         idol_hit.name = localize('k_none')
    end
    if ancient_h then 
        ancient_hit.name = 'Ancient: ' .. ancient_h.suit
    else 
        ancient_hit.name = localize('k_none')
    end
    if mail_h then
        mail_hit.name = 'Rebate: ' .. mail_h.rank
    else
        mail_hit.name = localize('k_none')
    end
    if obs_h then
        obs_on.name = 'YOU HAVE OBSERVATORY'
    else
        obs_on.name = 'You dont have observatory'
    end
end'''
match_indent = true


[[patches]] 
[patches.pattern]
target = "cardarea.lua"
pattern = "{n=G.UIT.T, config={ref_table = self.config, ref_value = 'card_count', scale = 0.3, colour = G.C.WHITE}},"
position = "before"
payload = '''
self == G.consumeables and {n=G.UIT.C, config={align='cr'}, nodes={
    {n=G.UIT.R, config={align='cr'}, nodes={
        {n=G.UIT.T, config={ref_table = fool_card, ref_value = 'name', scale = 0.3, colour = G.C.WHITE}},
    }},
    {n=G.UIT.R, config={align='cr'}, nodes={
    {n=G.UIT.T, config={ref_table = mail_hit, ref_value = 'name', scale = 0.3, colour = G.C.WHITE}}
    }},
    {n=G.UIT.R, config={align='cr'}, nodes={
        {n=G.UIT.T, config={ref_table = idol_hit, ref_value = 'name', scale = 0.3, colour = G.C.WHITE}},
    }},
    {n=G.UIT.R, config={align='cr'}, nodes={
        {n=G.UIT.T, config={ref_table = ancient_hit, ref_value = 'name', scale = 0.3, colour = G.C.WHITE}},
    }},
    {n=G.UIT.R, config={align='cr'}, nodes={
    {n=G.UIT.T, config={ref_table = obs_on, ref_value = 'name', scale = 0.5, colour = G.C.WHITE}}
    }},
}} or nil,
'''
match_indent = true


